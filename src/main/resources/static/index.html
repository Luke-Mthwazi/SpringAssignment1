<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Course Management Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #1e293b;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { font-weight: 600; font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: var(--secondary); }

        /* Card Styling */
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1.5fr auto;
            gap: 12px;
            align-items: end;
        }

        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--secondary); }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus { outline: none; border-color: var(--primary); }

        button {
            padding: 11px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }

        /* Table Styling */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 16px; text-align: left; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 16px; border-top: 1px solid #f1f5f9; }

        /* Category Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-foundation { background: #dcfce7; color: #166534; }
        .badge-undergraduate { background: #dbeafe; color: #1e40af; }
        .badge-honours { background: #fef3c7; color: #92400e; }

        .btn-delete { background-color: transparent; color: var(--danger); padding: 6px; border: 1px solid var(--danger); }
        .btn-delete:hover { background-color: var(--danger); color: white; }

        /* Department Grouping Styles */
        .dept-group { margin-bottom: 20px; }
        .dept-title { font-size: 1.1rem; color: var(--primary); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 12px; }
        .dept-list { list-style-type: none; padding: 0; margin: 0; }
        .dept-list li { padding: 8px 0; color: var(--secondary); font-size: 0.95rem; }

        .empty-state { text-align: center; padding: 40px; color: var(--secondary); }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>CS Course Management</h1>
        <p class="subtitle">Spring Boot & REST API Integration</p>
    </header>

    <div class="card">
        <div class="form-grid">
            <div>
                <label for="courseId">Course ID</label>
                <input type="number" id="courseId" placeholder="101">
            </div>
            <div>
                <label for="courseName">Course Name</label>
                <input type="text" id="courseName" placeholder="Data Structures">
            </div>
            <div>
                <label for="courseCategory">Category</label>
                <select id="courseCategory">
                    <option value="Foundation">Foundation</option>
                    <option value="Undergraduate">Undergraduate</option>
                    <option value="Honours">Honours</option>
                </select>
            </div>
            <button onclick="addCourse()">+ Add</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Course Name</th>
                <th>Level</th>
                <th style="text-align: right;">Action</th>
            </tr>
            </thead>
            <tbody id="courseTableBody">
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2 style="margin-top: 0;">Department View (Grouped)</h2>
        <div id="departmentContainer">
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/courses';

    async function loadCourses() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('courseTableBody');

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No courses found. Add one above!</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(course => `
                <tr>
                    <td><strong>#${course.id}</strong></td>
                    <td>${course.name}</td>
                    <td><span class="badge badge-${course.category.toLowerCase()}">${course.category}</span></td>
                    <td style="text-align: right;">
                        <button class="btn-delete" onclick="deleteCourse(${course.id})">Remove</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            console.error("Load failed. Is Spring Boot running?", err);
            document.getElementById('courseTableBody').innerHTML = '<tr><td colspan="4" class="empty-state" style="color: red;">Error connecting to server. Is Spring Boot running on port 8080?</td></tr>';
        }
    }

    async function loadDepartmentView() {
        try {
            const res = await fetch(`${API_URL}/department`);
            const data = await res.json();
            const container = document.getElementById('departmentContainer');
            container.innerHTML = '';

            for (const [category, courses] of Object.entries(data)) {
                const groupHtml = `
          <div class="dept-group">
            <h3 class="dept-title">${category}</h3>
            <ul class="dept-list">
              ${courses.map(c => `<li><strong>#${c.id}</strong> - ${c.name}</li>`).join('')}
            </ul>
          </div>
        `;
                container.innerHTML += groupHtml;
            }
        } catch (err) {
            console.error("Failed to load department view", err);
        }
    }

    async function addCourse() {
        // FIX 1: Use parseInt to convert HTML text to a real Number for Java
        const rawId = document.getElementById('courseId').value;
        const id = parseInt(rawId);

        const name = document.getElementById('courseName').value;
        const category = document.getElementById('courseCategory').value;

        if(!rawId || !name) {
            alert("Please fill in all fields before adding a course.");
            return;
        }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // JSON object now passes 'id' as a Number, matching your Java backend
                body: JSON.stringify({ id: id, name: name, category: category })
            });

            // FIX 2: Check if Java rejected the request (e.g. name was too short)
            if (!response.ok) {
                alert("Server rejected the request. Does the course name have at least 3 characters?");
                return;
            }

            // Clear the inputs
            document.getElementById('courseId').value = '';
            document.getElementById('courseName').value = '';

            // Refresh the screen
            await loadCourses();
            await loadDepartmentView();

        } catch (error) {
            alert("Could not reach the server to add the course. Make sure Spring Boot is running.");
        }
    }

    async function deleteCourse(id) {
        if(confirm("Are you sure you want to remove this course?")) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            await loadCourses();
            await loadDepartmentView();
        }
    }

    // Initial load
    loadCourses();
    loadDepartmentView();
</script>

</body>
</html>
